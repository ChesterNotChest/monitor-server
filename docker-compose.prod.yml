services:
  app:
    image: ${DOCKER_IMAGE:-monitor-server}:${IMAGE_TAG:-latest}
    build:
      context: ./monitor-server
      dockerfile: Dockerfile
    container_name: monitor-app
    environment:
      APP_NAME: ${APP_NAME:-Monitor Server}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_DEBUG: ${APP_DEBUG:-false}
      HOST: 0.0.0.0
      PORT: 8000
      FACE_IMAGE_DIR: /app/face_images
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DINGTALK_WEBHOOK: ${DINGTALK_WEBHOOK:-}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      STREAM_SERVER_URL: ${STREAM_SERVER_URL:-}
      RTMP_HOST: stream-server
      RTMP_PORT: 1935
      SRS_HOST: stream-server
      SRS_RTMP_PORT: 1935
      SRS_HTTP_PORT: 8080
      SRS_PUBLIC_HOST: ${SRS_PUBLIC_HOST:-10.126.59.25}
      SRS_PUBLIC_RTMP_PORT: ${RTMP_PORT:-1935}
      SRS_PUBLIC_HTTP_PORT: ${STREAM_HTTP_PORT:-8082}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./media:/app/media
      - ./face_images:/app/face_images
      - ${MODEL_DIR:-/home/liusu/video/models}:/app/src/third-party:ro
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: monitor-nginx
    ports:
      - "${HTTP_PORT:-8081}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  stream-server:
    image: ossrs/srs:5
    container_name: monitor-stream
    environment:
      CANDIDATE: ${SRS_CANDIDATE:-10.126.59.25}
    ports:
      - "${RTMP_PORT:-1935}:1935"
      - "${STREAM_HTTP_PORT:-8082}:8080"
      - "${SRS_API_PORT:-1985}:1985"
      - "${SRS_RTC_PORT:-8000}:8000/udp"
    volumes:
      - ./srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
    restart: unless-stopped
