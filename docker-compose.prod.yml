version: "3.8"

services:
  app:
    build:
      context: ./monitor-server
      dockerfile: Dockerfile
    container_name: monitor-app
    env_file:
      - ./monitor-server/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: monitor-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
