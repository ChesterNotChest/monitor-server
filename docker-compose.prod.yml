services:
  app:
    image: ${DOCKER_IMAGE:-monitor-server}:${IMAGE_TAG:-latest}
    build:
      context: ./monitor-server
      dockerfile: Dockerfile
    container_name: monitor-app
    environment:
      APP_NAME: ${APP_NAME:-Monitor Server}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_DEBUG: ${APP_DEBUG:-false}
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/monitor.db}
      STREAM_SERVER_URL: ${STREAM_SERVER_URL:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./media:/app/media
      - ./models:/app/models:ro
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: monitor-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
