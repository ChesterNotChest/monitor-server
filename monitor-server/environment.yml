name: monitor-server
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - ffmpeg>=7.0          # Server-side audio/video stream merge
  - nodejs>=20           # Local RTMP target for DEBUG_WEB_STREAM
  - pip
  - conda-forge::dlib>=19.24
  - pip:
    - fastapi>=0.110.0
    - uvicorn[standard]>=0.29.0
    - sqlalchemy>=2.0.0
    - pydantic-settings>=2.0.0
    - python-multipart>=0.0.9
    - pytest>=8.0.0
    - pytest-asyncio>=0.23.0
    - httpx>=0.27.0
    - python-jose[cryptography]>=3.3.0
    - bcrypt>=4.0.0
    - numpy>=1.26.0
    - ultralytics>=8.3.0
    - opencv-python-headless>=4.10
    - torch>=2.0.0
    - torchaudio>=2.1.0
    - tensorflow-hub>=0.16.0
    - tensorflow>=2.16.0
    - torchvision>=0.16.0
    - pytorchvideo>=0.1.5
    - setuptools<70
